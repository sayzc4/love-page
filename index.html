<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(to bottom, #ffd6e0, #fff0f5);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Press Start 2P', cursive;
  }

  .card {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 85%;
    max-width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  /* 💖 对称爱心（重点优化） */
  .heart {
    position: relative;
    width: 60px;
    height: 60px;
    margin: 0 auto 20px;
    transform: rotate(-45deg);
    background: #ff5c8a;
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 60px;
    height: 60px;
    background: #ff5c8a;
    border-radius: 50%;
  }

  .heart::before {
    top: -30px;
    left: 0;
  }

  .heart::after {
    left: 30px;
    top: 0;
  }

  #msg {
    display: none;
    font-size: 10px;
    line-height: 1.6;
  }

  button {
    display: block;
    width: 80%;
    margin: 12px auto;
    padding: 10px;
    font-family: 'Press Start 2P';
    font-size: 10px;
    border: 2px solid black;
    border-radius: 12px;
  }

  .yes {
    background: #ff5c8a;
    color: white;
  }

  .no {
    background: #eee;
  }

</style>
</head>

<body onclick="showMessage()">

<div class="card">

  <div class="heart"></div>

  <div id="msg">
    Hi Tom 💌<br><br>
    I think I like you.<br>
    Do you like me too?

    <button class="yes" onclick="yes(event)">YES 💗</button>
    <button class="no" onclick="nope(event)">NO 🙈</button>
  </div>

</div>

<script>
let name = "Tom";

function showMessage() {
  document.getElementById("msg").style.display = "block";
}

function yes(event) {
  event.stopPropagation();
  alert("Yay " + name + "! 💖");
}

function nope(event) {
  event.stopPropagation();
  alert("Hmm... try again 😏");
}
</script>

</body>
</html>
