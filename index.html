<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💌</title>

<style>
body {
  margin: 0;
  background: #ffe6eb;
  font-family: monospace;
  display: flex;
  justify-content: center;
}

.card {
  margin-top: 80px;
  background: white;
  padding: 25px;
  border-radius: 20px;
  width: 90%;
  max-width: 340px;
  text-align: center;
}

h2 {
  margin-bottom: 10px;
}

p {
  font-size: 14px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 14px;
}

.yes {
  background: #ff4d6d;
  color: white;
}

.no {
  background: #ddd;
}

button:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<div class="card">

  <h2>Hi...</h2>

  <p id="text">
    I have something to tell you.
  </p>

  <button class="yes" onclick="next()">Tell me</button>
  <button class="no" onclick="end()">Ignore</button>

</div>

<script>

let step = 0;

function next() {
  step++;

  if(step === 1){
    document.getElementById("text").innerHTML =
    "I think I like you.";
  }

  else if(step === 2){
    document.getElementById("text").innerHTML =
    "Do you feel the same?";
  }

  else if(step === 3){
    document.getElementById("text").innerHTML =
    "Don’t take too long...";
  }

  else if(step === 4){
    document.getElementById("text").innerHTML =
    "I might lose interest 😶‍🌫️";
  }
}

function end(){
  document.getElementById("text").innerHTML =
  "Oh… okay then.";
}

</script>

</body>
</html>
