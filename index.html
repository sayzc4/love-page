<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jealousy Test 💘</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: #f8d7da;
  display: flex;
  justify-content: center;
}

.card {
  background: #fff;
  margin-top: 60px;
  width: 90%;
  max-width: 350px;
  padding: 25px;
  border-radius: 20px;
  text-align: center;
}

.heart {
  font-size: 50px;
  animation: beat 1s infinite;
}

@keyframes beat {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

h2 {
  margin: 10px 0;
}

p {
  font-size: 14px;
  margin: 15px 0;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  font-size: 14px;
  cursor: pointer;
}

.yes {
  background: #ff4d6d;
  color: white;
}

.no {
  background: #ddd;
}

button:active {
  transform: scale(0.95);
}
</style>
</head>

<body>

<div class="card">
  <div class="heart">💗</div>

  <h2>Hi Tom...</h2>
  <p id="text">
    I saw someone flirting with me today.<br>
    I didn’t stop them.
  </p>

  <button class="yes" onclick="next()">What do you mean?</button>
  <button class="no" onclick="end()">Okay.</button>
</div>

<script>

let step = 0;

function next() {
  step++;

  if(step === 1){
    document.getElementById("text").innerHTML =
    "They were kinda cute.<br>Just saying.";
  }

  else if(step === 2){
    document.getElementById("text").innerHTML =
    "You don’t mind, right?";
  }

  else if(step === 3){
    document.getElementById("text").innerHTML =
    "Hmm... interesting 😏";
  }

  else if(step === 4){
    document.getElementById("text").innerHTML =
    "I think I got my answer 💔";
  }
}

function end(){
  document.getElementById("text").innerHTML =
  "Oh... so you really don’t care?";
}

</script>

</body>
</html>
