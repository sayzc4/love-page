<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For You 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: linear-gradient(to bottom, #ffd6e0, #fff0f5);
    text-align: center;
    font-family: 'Press Start 2P', cursive;
  }

  .card {
    background: white;
    padding: 20px;
    border-radius: 20px;
    margin: 40px auto;
    width: 90%;
    max-width: 350px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  }

  .heart {
    font-size: 50px;
    animation: beat 1s infinite;
  }

  @keyframes beat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  #msg {
    display: none;
    margin-top: 20px;
    font-size: 10px;
    line-height: 1.6;
  }

  button {
    display: block;
    width: 80%;
    margin: 10px auto;
    padding: 10px;
    font-family: 'Press Start 2P';
    font-size: 10px;
    border: 2px solid black;
    border-radius: 10px;
  }

  .yes {
    background: #ff5c8a;
    color: white;
  }

  .no {
    background: #ccc;
  }

</style>
</head>

<body onclick="showMessage()">

<div class="card">

  <div class="heart">❤️</div>

  <div id="msg">
    Hi Gwen 💌<br><br>
    I think I like you.<br>
    Do you like me too?
    
    <button class="yes" onclick="yes(event)">YES 💗</button>
    <button class="no" onclick="moveNo()">NO 🙈</button>
  </div>

</div>

<script>
let name = "Gwen";

function showMessage() {
  document.getElementById("msg").style.display = "block";
}

function yes(event) {
  event.stopPropagation();
  alert("Yay " + name + "! 💖");
}

function moveNo() {
  alert("Hmm… you sure? 😏");
}
</script>

</body>
</html>
