<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You 💌</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    background: linear-gradient(to bottom, #ffd6e0, #fff0f5);
    text-align: center;
    font-family: 'Press Start 2P', cursive;
    overflow: hidden;
  }

  /* 💗 漂浮爱心 */
  .floating {
    position: absolute;
    width: 100%;
    top: 0;
    font-size: 20px;
    animation: float 10s linear infinite;
    opacity: 0.5;
  }

  @keyframes float {
    0% { transform: translateY(100vh); }
    100% { transform: translateY(-10vh); }
  }

  /* 🎀 卡片 */
  .card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    display: inline-block;
    margin-top: 80px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  /* ❤️ 爱心 */
  .heart {
    font-size: 200px;
    animation: beat 1s infinite;
  }

  @keyframes beat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  #msg {
    display: none;
    margin-top: 20px;
    font-size: 12px;
    line-height: 1.6;
  }

  button {
    margin: 10px;
    padding: 10px;
    font-family: 'Press Start 2P';
    font-size: 10px;
    border: 3px solid black;
    background: white;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    transform: scale(1.1);
  }

  .yes {
    background: #ff5c8a;
    color: white;
  }

  .no {
    position: absolute;
  }

</style>
</head>

<body onclick="showMessage()">

<div class="floating">💗 💕 💖 💞 💓 💘 💝</div>

<div class="card">

  <div class="heart">❤️</div>

  <div id="msg">
    Hi Tom... 💌<br><br>
    I think I like you.<br>
    Do you like me too?
    <br><br>

    <button class="yes" onclick="yes(event)">YES</button>
    <button class="no" id="noBtn" onmouseover="moveNo()">NO</button>
  </div>

</div>

<script>
  let name = "Tom";

  function showMessage() {
    document.getElementById("msg").style.display = "block";
  }

  function yes(event) {
    event.stopPropagation();
    alert("Yay " + name + "! It's a date 💖");
  }

  function moveNo() {
    let btn = document.getElementById("noBtn");
    let x = Math.random() * window.innerWidth * 0.6;
    let y = Math.random() * window.innerHeight * 0.6;
    btn.style.left = x + "px";
    btn.style.top = y + "px";
  }
</script>

</body>
</html>
